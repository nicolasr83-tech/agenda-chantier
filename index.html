<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Arragon Planning">
<meta name="theme-color" content="#1F3864">
<title>Planning – Cabinet Arragon</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#1F3864;--blue:#2E75B6;--lblue:#D6E4F7;--white:#fff;
  --grey:#F4F5F7;--border:#DEE2E8;--text:#1A1D23;--muted:#6B7280;
  --green:#16A34A;--green-bg:#DCFCE7;--red:#DC2626;
  --radius:10px;--safe-bottom:env(safe-area-inset-bottom,0px);
  --sidebar-w:300px;
}
html,body{height:100%;background:var(--grey);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);overflow:hidden}

/* Header */
.header{background:var(--navy);color:var(--white);display:flex;align-items:center;padding:0 12px;height:56px;gap:8px;position:relative;z-index:200}
.header h1{font-size:15px;font-weight:700;flex:1}
.user-chip{display:flex;align-items:center;gap:6px;cursor:pointer}
.user-avatar{width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,.4);object-fit:cover}
.user-name{font-size:11px;color:rgba(255,255,255,.8);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-icon{background:rgba(255,255,255,.12);border:none;color:var(--white);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-signin-h{font-size:11px;color:var(--white);background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:4px 12px;cursor:pointer;font-weight:500;white-space:nowrap}

/* Layout */
.app{display:flex;height:calc(100vh - 56px);overflow:hidden;position:relative}

/* Sidebar */
.sidebar{width:var(--sidebar-w);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:transform .25s ease;z-index:150;flex-shrink:0}
.sidebar.hidden{transform:translateX(-100%);position:absolute;top:0;left:0;height:100%;box-shadow:4px 0 20px rgba(0,0,0,.15)}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.stab{flex:1;padding:9px 2px;text-align:center;font-size:10px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.stab.active{color:var(--blue);border-bottom-color:var(--blue)}
.sidebar-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sidebar-panel{display:none;padding:10px}
.sidebar-panel.active{display:block}
.s-section{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin:10px 0 5px}
.s-item{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:8px;cursor:pointer;border:1px solid var(--border);margin-bottom:5px;background:var(--white)}
.s-item:hover{background:var(--grey)}
.s-dot{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--white)}
.s-name{flex:1;font-size:12px;font-weight:500}
.s-sub{font-size:11px;color:var(--muted)}
.s-edit{font-size:13px;color:var(--muted);cursor:pointer;padding:3px;border:none;background:none}
.s-edit:hover{color:var(--blue)}
.s-form{background:var(--grey);border-radius:8px;padding:10px;margin-bottom:8px;display:none}
.s-form.visible{display:block}
.s-form-title{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;margin-bottom:7px}
.s-field{margin-bottom:6px}
.s-field label{font-size:11px;color:var(--muted);display:block;margin-bottom:2px;font-weight:500}
.s-field input,.s-field select{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:7px;font-size:13px;background:var(--white);outline:none;color:var(--text)}
.s-field input:focus{border-color:var(--blue)}
.s-form-btns{display:flex;gap:6px;margin-top:7px}
.s-btn-save{flex:1;background:var(--blue);color:var(--white);border:none;border-radius:7px;padding:8px;font-size:13px;font-weight:600;cursor:pointer}
.s-btn-cancel{background:var(--white);border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:13px;cursor:pointer;color:var(--muted)}
.s-grid2{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.color-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px}
.csw{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.csw.sel{border-color:var(--navy);box-shadow:0 0 0 2px var(--white),0 0 0 3px var(--navy)}
.search-row-s{display:flex;gap:6px;margin-bottom:8px;align-items:center}
.search-row-s input{flex:1;padding:7px 9px;border:1px solid var(--border);border-radius:7px;font-size:13px;outline:none;background:var(--white)}
.btn-add-s{background:var(--blue);color:var(--white);border:none;border-radius:7px;width:30px;height:30px;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}

/* Calendar */
.cal-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.cal-nav{display:flex;align-items:center;padding:8px 12px;gap:6px;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0}
.cal-title{flex:1;font-size:15px;font-weight:700;text-align:center}
.cal-nav-btn{background:none;border:1px solid var(--border);border-radius:7px;padding:5px 10px;cursor:pointer;font-size:13px;color:var(--text)}
.cal-nav-btn:hover{background:var(--grey)}
.btn-today{background:var(--blue);color:var(--white);border:none;border-radius:7px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer}
.cal-grid{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.cal-dow-cell{padding:5px 0;text-align:center;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase}
.cal-dow-cell:first-child,.cal-dow-cell:last-child{color:var(--red)}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:160px}
.cal-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:3px;cursor:pointer;background:var(--white);overflow:hidden}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell:hover{background:#f8faff}
.cal-cell.other-month{background:#fafafa}
.cal-cell.other-month .day-num{color:#ccc}
.cal-cell.today{background:#eff6ff}
.cal-cell.today .day-num{background:var(--blue);color:var(--white);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-weight:700}
.cal-cell.weekend .day-num{color:var(--red)}
.day-num{font-size:11px;font-weight:600;color:var(--text);margin-bottom:2px;width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.ev-chip{border-radius:3px;padding:1px 4px;font-size:9px;font-weight:600;margin-bottom:1px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--white);line-height:1.5}
.ev-chip:hover{opacity:.85}
.ev-more{font-size:9px;color:var(--muted);padding:1px 3px;cursor:pointer;font-weight:600}
.ev-more:hover{color:var(--blue);text-decoration:underline}

/* Mobile */
.fab{display:none;position:fixed;bottom:calc(20px + var(--safe-bottom));right:20px;width:50px;height:50px;border-radius:50%;background:var(--blue);color:var(--white);border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(46,117,182,.4);z-index:100;align-items:center;justify-content:center}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:140}
.overlay.visible{display:block}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:var(--white);border-radius:14px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-header{padding:16px 16px 0;display:flex;align-items:flex-start;justify-content:space-between}
.modal-title{font-size:16px;font-weight:700;color:var(--navy)}
.modal-date{font-size:12px;color:var(--muted);margin-top:2px}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);padding:4px;line-height:1}
.modal-body{padding:14px 16px}
.m-field{margin-bottom:12px}
.m-field label{font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.m-select{width:100%;padding:10px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--white);outline:none;color:var(--text);-webkit-appearance:none}
.m-select:focus{border-color:var(--blue)}
.m-input{width:100%;padding:10px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--white);outline:none;color:var(--text)}
.m-input:focus{border-color:var(--blue)}
.m-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.m-toggle{display:flex;background:var(--grey);border-radius:8px;padding:2px;flex-wrap:wrap;gap:2px}
.m-toggle button{flex:1;padding:7px 4px;border:none;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;background:none;color:var(--muted);min-width:50px}
.m-toggle button.active{background:var(--white);color:var(--navy);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.collab-preview{display:flex;align-items:center;gap:7px;padding:7px 10px;background:var(--grey);border-radius:8px;margin-top:5px}
.cp-dot{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--white)}
.cp-info{font-size:13px;font-weight:500}
.modal-footer{padding:0 16px 16px;display:flex;gap:7px}
.btn-modal-cancel{flex:1;padding:12px;border-radius:8px;font-size:13px;font-weight:500;border:1.5px solid var(--border);background:var(--white);color:var(--text);cursor:pointer}
.btn-modal-save{flex:2;padding:12px;border-radius:8px;font-size:13px;font-weight:700;background:var(--blue);color:var(--white);border:none;cursor:pointer}
.btn-modal-del{padding:12px;border-radius:8px;font-size:15px;border:1.5px solid #fecaca;background:#fff5f5;color:var(--red);cursor:pointer}
.half-day-toggle{display:none;gap:8px;margin-top:8px}
.half-day-toggle.visible{display:flex}
.hd-btn{flex:1;padding:9px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;background:var(--white);color:var(--muted);transition:all .15s;text-align:center}
.hd-btn.active{border-color:var(--blue);background:var(--lblue);color:var(--navy);font-weight:700}
.hd-btn:active{transform:scale(.97)}
.search-modal-wrap input{width:100%;padding:9px 9px 9px 32px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;background:var(--white);color:var(--text)}
.search-modal-wrap input:focus{border-color:var(--blue)}
.search-modal-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px}

/* More popup */
.more-popup{position:fixed;background:var(--white);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);padding:10px;z-index:500;min-width:190px;max-width:250px}

/* Status */
.status-toast{position:fixed;bottom:calc(70px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(30px);background:var(--green);color:var(--white);padding:9px 18px;border-radius:30px;font-size:12px;font-weight:600;z-index:999;opacity:0;transition:all .3s ease;pointer-events:none}
.status-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.status-toast.error{background:var(--red)}
.loading-bar{height:3px;background:var(--blue);position:fixed;top:56px;left:0;width:0;z-index:999;transition:width .3s}

/* Login */
.login-overlay{display:none;position:fixed;inset:0;background:var(--navy);z-index:500;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center}
.login-overlay.visible{display:flex}
.login-logo{font-size:52px;margin-bottom:14px}
.login-title{font-size:22px;font-weight:700;color:var(--white);margin-bottom:8px}
.login-sub{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:32px;line-height:1.6;max-width:290px}
.btn-google{background:var(--white);color:#1a1d23;border:none;border-radius:12px;padding:14px 22px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:10px;width:100%;max-width:270px;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.15)}

/* Mobile responsive */
@media(max-width:768px){
  .fab{display:flex}
  .sidebar{position:absolute;top:0;left:0;height:100%;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .cal-days{grid-auto-rows:80px}
  .ev-chip{font-size:8px;padding:1px 2px}
  .cal-dow-cell{font-size:9px}
  .day-num{font-size:10px;width:18px;height:18px}
}
</style>
</head>
<body>

<div class="login-overlay" id="login-overlay">
  <div class="login-logo">📐</div>
  <div class="login-title">Arragon Planning</div>
  <div class="login-sub">Cabinet Arragon – Géomètre Topographe<br>Connecte-toi pour accéder au calendrier partagé.</div>
  <button class="btn-google" onclick="signIn()">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Se connecter avec Google
  </button>
</div>

<div class="header">
  <button class="btn-icon" onclick="toggleSidebar()" title="Panneau">☰</button>
  <h1>Arragon Planning</h1>
  <button class="btn-icon" onclick="openExportModal()" title="Exporter">📥</button>
  <div id="user-bar"><button class="btn-signin-h" onclick="signIn()">Se connecter</button></div>
</div>

<div class="app">
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-tabs">
      <div class="stab active" onclick="switchSTab('dossiers')">📁 Dossiers</div>
      <div class="stab" onclick="switchSTab('collabs')">👤 Collabs</div>
      <div class="stab" onclick="switchSTab('materiel')">🔧 Matériel</div>
    </div>
    <div class="sidebar-content">

      <!-- DOSSIERS -->
      <div class="sidebar-panel active" id="sp-dossiers">
        <div class="s-form" id="dos-form">
          <div class="s-form-title" id="dos-form-title">Nouveau dossier</div>
          <div class="s-field"><label>N° dossier *</label><input id="f-dos-num" placeholder="41521/040" autocomplete="off"></div>
          <div class="s-field"><label>Client</label><input id="f-dos-client" placeholder="NGE Fondations" autocomplete="off"></div>
          <div class="s-field"><label>Lieu / Chantier</label><input id="f-dos-lieu" placeholder="Marseille Centre" autocomplete="off"></div>
          <div class="s-field"><label>Interlocuteur</label><input id="f-dos-interlocuteur" placeholder="Jean Martin" autocomplete="off"></div>
          <div class="s-field"><label>Adresse précise</label><input id="f-dos-adresse" placeholder="12 Rue de la Paix, 83000" autocomplete="off"></div>
          <div class="s-grid2">
            <div class="s-field"><label>Prix 1J Terrain</label><input id="f-dos-p1t" type="number" placeholder="620"></div>
            <div class="s-field"><label>Prix ½J Terrain</label><input id="f-dos-pht" type="number" placeholder="480"></div>
            <div class="s-field"><label>Prix Bureau</label><input id="f-dos-pb" type="number" placeholder="520"></div>
            <div class="s-field"><label>Prix Nuit</label><input id="f-dos-pn" type="number" placeholder="1060"></div>
            <div class="s-field"><label>Prix Scan 3D</label><input id="f-dos-ps3d" type="number" placeholder="1200"></div>
          </div>
          <div class="s-form-btns">
            <button class="s-btn-cancel" onclick="closeDosForm()">Annuler</button>
            <button class="s-btn-save" id="dos-save-btn" onclick="saveDos()">Enregistrer</button>
          </div>
        </div>
        <div class="search-row-s">
          <input type="search" id="s-search-dos" placeholder="Rechercher…" oninput="renderSidebarDos()">
          <button class="btn-add-s" onclick="openDosForm(null)" title="Nouveau dossier">＋</button>
        </div>
        <div id="s-dos-list"></div>
      </div>

      <!-- COLLABS -->
      <div class="sidebar-panel" id="sp-collabs">
        <div class="s-form" id="collab-form">
          <div class="s-form-title" id="collab-form-title">Nouveau collaborateur</div>
          <div class="s-field"><label>Prénom Nom *</label><input id="f-collab-name" placeholder="Marie Dupont" autocomplete="off"></div>
          <div class="s-field"><label>Pseudo agenda</label><input id="f-collab-pseudo" placeholder="Micka (utilisé dans le titre)" autocomplete="off"></div>
          <div class="s-field"><label>Couleur agenda</label><div class="color-row" id="collab-color-row"></div></div>
          <div class="s-form-btns">
            <button class="s-btn-cancel" onclick="closeCollabForm()">Annuler</button>
            <button class="s-btn-save" id="collab-save-btn" onclick="saveCollab()">Enregistrer</button>
          </div>
        </div>
        <div class="search-row-s">
          <input type="search" id="s-search-collab" placeholder="Rechercher…" oninput="renderSidebarCollabs()">
          <button class="btn-add-s" onclick="openCollabForm(null)" title="Nouveau collaborateur">＋</button>
        </div>
        <div id="s-collab-list"></div>
      </div>

      <!-- MATERIEL -->
      <div class="sidebar-panel" id="sp-materiel">
        <div class="s-form" id="mat-form">
          <div class="s-form-title" id="mat-form-title">Nouveau matériel</div>
          <div class="s-field"><label>Nom *</label><input id="f-mat-name" placeholder="GPS Leica GS18" autocomplete="off"></div>
          <div class="s-field"><label>Catégorie</label>
            <select id="f-mat-cat">
              <option>Instrument topo</option><option>Drone</option>
              <option>Scanner 3D</option><option>Véhicule</option><option>Autre</option>
            </select>
          </div>
          <div class="s-form-btns">
            <button class="s-btn-cancel" onclick="closeMatForm()">Annuler</button>
            <button class="s-btn-save" id="mat-save-btn" onclick="saveMat()">Enregistrer</button>
          </div>
        </div>
        <div class="search-row-s">
          <input type="search" id="s-search-mat" placeholder="Rechercher…" oninput="renderSidebarMat()">
          <button class="btn-add-s" onclick="openMatForm(null)" title="Nouveau matériel">＋</button>
        </div>
        <div id="s-mat-list"></div>
      </div>
    </div>
  </div>

  <!-- Calendrier -->
  <div class="cal-wrap">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="cal-title" id="cal-title"></div>
      <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
      <button class="btn-today" onclick="goToday()">Aujourd'hui</button>
    </div>
    <div class="cal-dow" id="cal-dow"></div>
    <div class="cal-grid"><div class="cal-days" id="cal-days"></div></div>
  </div>
</div>

<button class="fab" onclick="openModal(null)">＋</button>

<!-- Modal création/édition -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div><div class="modal-title" id="modal-title">Nouvel événement</div><div class="modal-date" id="modal-date"></div></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="m-field">
        <label>Dossier / Chantier</label>
        <div class="search-modal-wrap">
          <span class="search-modal-icon">🔍</span>
          <input type="search" id="m-dos-search" placeholder="Rechercher un dossier…" oninput="filterModalDos()" autocomplete="off">
        </div>
        <select class="m-select" id="m-dossier" size="4" style="height:auto;padding:0" onchange="updateModalPreview()"></select>
      </div>
      <div class="m-field">

window.addEventListener("load",()=>{
  // Vérifie le token en session d'abord, sinon localStorage avec expiry
  let t=sessionStorage.getItem("arr_token");
  if(!t){
    const stored=localStorage.getItem("arr_token");
    const expiry=parseInt(localStorage.getItem("arr_token_expiry")||"0");
    if(stored&&Date.now()<expiry){
      t=stored;
      sessionStorage.setItem("arr_token",t);
    }
  }
  if(t){accessToken=t;currentUser=ls("arr_user");renderUserBar();loadAll();}
  else document.getElementById("login-overlay").classList.add("visible");
  initTokenClient();
  renderDow();buildCalendar();
});
function initTokenClient(){
  if(!window.google){setTimeout(initTokenClient,300);return;}
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,scope:SCOPES,
    callback:(resp)=>{
      if(resp.error){showToast("Connexion annulée",true);return;}
      accessToken=resp.access_token;
      // Stocker avec expiration (1h)
      const expiry=Date.now()+3500*1000;
      localStorage.setItem("arr_token",accessToken);
      localStorage.setItem("arr_token_expiry",expiry);
      sessionStorage.setItem("arr_token",accessToken);
      fetchUserInfo();
      document.getElementById("login-overlay").classList.remove("visible");
      loadAll();
    }
  });
}
function signIn(){
  if(!tokenClient){setTimeout(signIn,400);return;}
  // Ne demande le consentement que si pas de token valide
  tokenClient.requestAccessToken({prompt:""});
}
function signOut(){
  if(accessToken)google.accounts.oauth2.revoke(accessToken);
  accessToken=null;currentUser=null;
  sessionStorage.removeItem("arr_token");
  localStorage.removeItem("arr_token");
  localStorage.removeItem("arr_token_expiry");
  lsSet("arr_user",null);
  calEvents=[];buildCalendar();renderUserBar();
  document.getElementById("login-overlay").classList.add("visible");
}
function fetchUserInfo(){
  fetch("https://www.googleapis.com/oauth2/v3/userinfo",{headers:{Authorization:"Bearer "+accessToken}})
    .then(r=>r.json()).then(u=>{currentUser=u;lsSet("arr_user",u);renderUserBar();});
}
function renderUserBar(){
  const bar=document.getElementById("user-bar");
  if(currentUser&&accessToken){
    bar.innerHTML=`<div class="user-chip" onclick="signOut()" title="Déconnecter">

      <span class="user-name">${currentUser.name||currentUser.email}</span></div>`;
  }else{bar.innerHTML=`<button class="btn-signin-h" onclick="signIn()">Se connecter</button>`;}
}

// ══ GOOGLE SHEETS ═════════════════════════════════════════════════════════════
async function sheetGet(tab,range){
  const r=encodeURIComponent(`${tab}!${range}`);
  const resp=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${r}`,
    {headers:{Authorization:"Bearer "+accessToken}});
  if(!resp.ok)throw new Error("Sheet read "+resp.status);
  return (await resp.json()).values||[];
}
async function sheetAppend(tab,values){
  const r=encodeURIComponent(`${tab}!A:Z`);
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${r}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`,
    {method:"POST",headers:{Authorization:"Bearer "+accessToken,"Content-Type":"application/json"},
     body:JSON.stringify({values})});
}
async function sheetUpdate(tab,rowIdx,values){
  const row=rowIdx+2;
  const r=encodeURIComponent(`${tab}!A${row}:Z${row}`);
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${r}?valueInputOption=USER_ENTERED`,
    {method:"PUT",headers:{Authorization:"Bearer "+accessToken,"Content-Type":"application/json"},
     body:JSON.stringify({values})});
}
async function sheetClear(tab){
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(tab+"!A2:Z1000")}:clear`,
    {method:"POST",headers:{Authorization:"Bearer "+accessToken,"Content-Type":"application/json"}});
}

async function loadSheetData(){
  if(!accessToken)return;
  try{
    // Dossiers
    const drows=await sheetGet(SHEET_TABS.dos,"A2:J1000");
    sheetDossiers=drows.filter(r=>r[0]?.trim()).map(r=>({
      num:r[0]?.trim(),client:r[1]?.trim()||"—",lieu:r[2]?.trim()||"—",
      interlocuteur:r[3]?.trim()||"",adresse:r[4]?.trim()||"",
      prix1T:parseFloat(r[5])||0,prixHT:parseFloat(r[6])||0,
      prixB:parseFloat(r[7])||0,prixN:parseFloat(r[8])||0,prixS3D:parseFloat(r[9])||0,
    })).sort((a,b)=>{
      const p=s=>{const m=s.match(/^(\d+)(?:[\/\-](\d+))?/);return m?[parseInt(m[1]),parseInt(m[2]||0)]:[0,0];};
      const[a1,a2]=p(a.num),[b1,b2]=p(b.num);return a1!==b1?a1-b1:a2-b2;
    });
    renderSidebarDos();filterModalDos();

    // Collabs
    const crows=await sheetGet(SHEET_TABS.collabs,"A2:C1000");
    sheetCollabs=crows.filter(r=>r[0]?.trim()).map(r=>({
      name:r[0]?.trim(),pseudo:r[1]?.trim()||"",colorId:r[2]?.trim()||"7"
    }));
    renderSidebarCollabs();updateModalCollab();

    // Matériel
    const mrows=await sheetGet(SHEET_TABS.mat,"A2:B1000");
    sheetMat=mrows.filter(r=>r[0]?.trim()).map(r=>({
      name:r[0]?.trim(),cat:r[1]?.trim()||"Autre"
    }));
    renderSidebarMat();updateModalMat();
  }catch(e){console.warn("Sheet load error",e);}
}

// ══ CALENDAR LOAD ═════════════════════════════════════════════════════════════
async function loadCalendar(){
  if(!accessToken)return;
  const first=new Date(curYear,curMonth,1).toISOString();
  const last=new Date(curYear,curMonth+1,0,23,59,59).toISOString();
  setLoading(true);
  try{
    const url=`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?timeMin=${encodeURIComponent(first)}&timeMax=${encodeURIComponent(last)}&singleEvents=true&orderBy=startTime&maxResults=500`;
    const resp=await fetch(url,{headers:{Authorization:"Bearer "+accessToken}});
    if(!resp.ok){if(resp.status===401){accessToken=null;signIn();}setLoading(false);return;}
    calEvents=(await resp.json()).items||[];
    buildCalendar();
  }catch(e){showToast("Erreur chargement",true);}
  setLoading(false);
}

// ══ CALENDAR RENDER ═══════════════════════════════════════════════════════════
function renderDow(){
  const days=["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
  document.getElementById("cal-dow").innerHTML=days.map((d,i)=>
    `<div class="cal-dow-cell"${i>=5?' style="color:var(--red)"':""}>${d}</div>`).join("");
}

function eventsIndexedByDate(){
  const byDate={};
  calEvents.forEach(ev=>{
    let ds=ev.start?.date||ev.start?.dateTime?.slice(0,10);
    let de=ev.end?.date||ev.end?.dateTime?.slice(0,10);
    if(!ds)return;
    if(ev.end?.date){const e=new Date(de);e.setDate(e.getDate()-1);de=e.toISOString().slice(0,10);}
    if(!de||de<ds)de=ds;
    let cur=new Date(ds+"T12:00:00");
    const last=new Date(de+"T12:00:00");
    while(cur<=last){
      const key=cur.toISOString().slice(0,10);
      if(!byDate[key])byDate[key]=[];
      byDate[key].push({...ev,_isStart:key===ds,_isEnd:key===de,_spanDays:ds!==de});
      cur.setDate(cur.getDate()+1);
    }
  });
  return byDate;
}

function buildCalendar(){
  document.getElementById("cal-title").textContent=`${MONTHS_FR[curMonth]} ${curYear}`;
  const today=new Date();
  let startDow=new Date(curYear,curMonth,1).getDay();
  startDow=startDow===0?6:startDow-1;
  const daysInMonth=new Date(curYear,curMonth+1,0).getDate();
  const totalCells=Math.ceil((startDow+daysInMonth)/7)*7;
  const byDate=eventsIndexedByDate();
  const maxShow=window.innerWidth<=768?2:6;
  let html="";
  for(let i=0;i<totalCells;i++){
    const dt=new Date(curYear,curMonth,1+i-startDow);
    const y=dt.getFullYear(),m=dt.getMonth(),d=dt.getDate();
    const ds=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const inMonth=m===curMonth;
    const isToday=y===today.getFullYear()&&m===today.getMonth()&&d===today.getDate();
    const isWeekend=dt.getDay()===0||dt.getDay()===6;
    const evs=byDate[ds]||[];
    let cls="cal-cell";
    if(!inMonth)cls+=" other-month";
    if(isToday)cls+=" today";
    if(isWeekend)cls+=" weekend";
    const chips=evs.slice(0,maxShow).map(ev=>{
      const col=getEventColor(ev);const lbl=getEventLabel(ev);
      const icon=ev._spanDays?(ev._isStart?"→":ev._isEnd?"←":"↔"):"";
      return `<div class="ev-chip" style="background:${col}" onclick="event.stopPropagation();openEditModal('${ev.id}')" title="${ev.summary||''}">${icon?icon+" ":""}${lbl}</div>`;
    }).join("");
    const more=evs.length>maxShow?`<div class="ev-more" onclick="event.stopPropagation();showMorePopup(this,'${ds}')">+${evs.length-maxShow} autre${evs.length-maxShow>1?"s":""}</div>`:"";
    const dayNum=isToday?`<div class="day-num"><span>${d}</span></div>`:`<div class="day-num">${d}</div>`;
    html+=`<div class="${cls}" onclick="openModal('${ds}')">${dayNum}${chips}${more}</div>`;
  }
  document.getElementById("cal-days").innerHTML=html;
}

function getEventColor(ev){
  if(ev.colorId){const c=GCAL_COLORS.find(x=>x.id===ev.colorId);if(c)return c.hex;}
  const m=(ev.summary||"").split("_");
  if(m.length>=3){
    const tag=m[m.length-1];
    const c=sheetCollabs.find(x=>x.pseudo?.toLowerCase()===tag.toLowerCase()||collabInit(x.name).toLowerCase()===tag.toLowerCase());
    if(c)return collabColor(c);
  }
  return "#2E75B6";
}
function getEventLabel(ev){
  const parts=(ev.summary||"").split("_");
  if(parts.length>=2){
    // parts[1] peut être "HT" ou "HT" suivi de "_M"/"_AM" — on prend juste dos_code
    const code=parts[1].replace(/^(HT|1T|B|N|S3D).*/,"$1"); // sécurité
    return `${parts[0]}_${code}`+(parts.length>2?" "+parts[parts.length-1]:"");
  }
  return(ev.summary||"").slice(0,14);
}

function showMorePopup(el,ds){
  document.querySelectorAll(".more-popup").forEach(p=>p.remove());
  const byDate=eventsIndexedByDate();
  const evs=byDate[ds]||[];
  const popup=document.createElement("div");
  popup.className="more-popup";
  popup.innerHTML=`<div style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:7px;text-transform:uppercase">${formatDateFr(ds)}</div>`+
    evs.map(ev=>`<div style="display:flex;align-items:center;gap:6px;padding:4px 5px;border-radius:5px;cursor:pointer" onmouseover="this.style.background='var(--grey)'" onmouseout="this.style.background=''" onclick="document.querySelectorAll('.more-popup').forEach(p=>p.remove());openEditModal('${ev.id}')">
      <div style="width:9px;height:9px;border-radius:50%;background:${getEventColor(ev)};flex-shrink:0"></div>
      <span style="font-size:12px;font-weight:500">${getEventLabel(ev)}</span></div>`).join("")+
    `<div style="margin-top:5px;border-top:1px solid var(--border);padding-top:5px;text-align:center">
      <span style="font-size:11px;color:var(--blue);cursor:pointer" onclick="document.querySelectorAll('.more-popup').forEach(p=>p.remove());openModal('${ds}')">＋ Nouvel événement</span></div>`;
  document.body.appendChild(popup);
  const rect=el.getBoundingClientRect();
  popup.style.left=Math.min(rect.left,window.innerWidth-260)+"px";
  popup.style.top=(rect.bottom+4)+"px";
  setTimeout(()=>document.addEventListener("click",function h(){popup.remove();document.removeEventListener("click",h);},),10);
}

function changeMonth(d){
  curMonth+=d;if(curMonth>11){curMonth=0;curYear++;}if(curMonth<0){curMonth=11;curYear--;}
  buildCalendar();loadCalendar();
}
function goToday(){curYear=new Date().getFullYear();curMonth=new Date().getMonth();buildCalendar();loadCalendar();}

  document.getElementById("btn-modal-save").textContent="Enregistrer";

  selectedHalfDay="matin";
  document.getElementById("hd-matin").classList.add("active");
  document.getElementById("hd-aprem").classList.remove("active");
  document.getElementById("half-day-toggle").classList.remove("visible");
  filterModalDos();updateModalCollab();updateModalMat();
  document.getElementById("m-mat-warning").style.display="none";
  document.getElementById("modal-bg").classList.add("open");

function openEditModal(evId){
  const ev=calEvents.find(e=>e.id===evId);if(!ev)return;
  editingEventId=evId;
  document.getElementById("modal-title").textContent="Modifier l'événement";
  document.getElementById("btn-del").style.display="flex";
  document.getElementById("btn-modal-save").textContent="Mettre à jour";
  const ds=ev.start?.date||ev.start?.dateTime?.slice(0,10)||new Date().toISOString().slice(0,10);
  let de=ev.end?.date||ev.end?.dateTime?.slice(0,10)||ds;
  if(ev.end?.date){const e=new Date(de);e.setDate(e.getDate()-1);de=e.toISOString().slice(0,10);}
  document.getElementById("m-date-start").value=ds;
  document.getElementById("m-date-end").value=de;
  document.getElementById("modal-date").textContent=formatDateFr(ds);
  document.getElementById("m-dos-search").value="";
  filterModalDos();updateModalCollab();updateModalMat();
  // Pré-remplir depuis le titre
  const parts=(ev.summary||"").split("_");
  if(parts.length>=1){
    const sel=document.getElementById("m-dossier");
    for(let i=0;i<sel.options.length;i++){if(sel.options[i].value===parts[0]){sel.selectedIndex=i;break;}}
  }
  if(parts.length>=2){
    const code=parts[1];
    const btns=document.querySelectorAll("#m-prest-toggle button");
    btns.forEach(b=>b.classList.remove("active"));
    const btn=document.querySelector(`[data-code="${code}"]`);
    if(btn)btn.classList.add("active");
    selectedPrest=code;
    // Demi-journée : détecter matin/aprem depuis le titre ou l'heure
    const hdToggle=document.getElementById("half-day-toggle");
    if(code==="HT"){
      hdToggle.classList.add("visible");
      // Cherche _M ou _AM dans le titre, sinon regarde l'heure de début
      if((ev.summary||"").includes("_AM")){
        selectedHalfDay="aprem";
        document.getElementById("hd-matin").classList.remove("active");
        document.getElementById("hd-aprem").classList.add("active");
      } else {
        selectedHalfDay="matin";
        document.getElementById("hd-matin").classList.add("active");
        document.getElementById("hd-aprem").classList.remove("active");
        // Vérif heure si dateTime
        if(ev.start?.dateTime){
          const h=new Date(ev.start.dateTime).getHours();
          if(h>=12){
            selectedHalfDay="aprem";
            document.getElementById("hd-matin").classList.remove("active");
            document.getElementById("hd-aprem").classList.add("active");
          }
        }
      }
    } else {
      hdToggle.classList.remove("visible");
    }
  }
  // Collaborateur : cherche par pseudo puis initiales puis colorId
  if(parts.length>=3){
    const tag=parts[parts.length-1];
    let ci=sheetCollabs.findIndex(c=>c.pseudo&&c.pseudo.toLowerCase()===tag.toLowerCase());
    if(ci<0)ci=sheetCollabs.findIndex(c=>collabInit(c.name).toLowerCase()===tag.toLowerCase());
    if(ci<0&&ev.colorId)ci=sheetCollabs.findIndex(c=>c.colorId===ev.colorId);
    if(ci>=0)document.getElementById("m-collab").value=ci;
  } else if(ev.colorId){
    const ci=sheetCollabs.findIndex(c=>c.colorId===ev.colorId);
    if(ci>=0)document.getElementById("m-collab").value=ci;
  }
  document.getElementById("m-notes").value=ev.description?.split("\n").filter(l=>!l.includes("–")&&!l.includes("Collaborateur")&&!l.includes("Interlocuteur")&&!l.includes("Matériel")&&!l.includes("Créé via"))[0]||"";
  document.getElementById("m-mat-warning").style.display="none";
  updateModalPreview();
  document.getElementById("modal-bg").classList.add("open");
}

function filterModalDos(){
  const q=(document.getElementById("m-dos-search")?.value||"").toLowerCase();
  const list=sheetDossiers.filter(d=>!q||(d.num+d.client+d.lieu).toLowerCase().includes(q));
  const sel=document.getElementById("m-dossier");const cur=sel.value;
  sel.innerHTML=list.map(d=>`<option value="${d.num}">${d.num} – ${d.client} – ${d.lieu}</option>`).join("");
  if(cur)for(let i=0;i<sel.options.length;i++){if(sel.options[i].value===cur){sel.selectedIndex=i;break;}}
  updateModalPreview();
}
function updateModalPreview(){
  const idx=parseInt(document.getElementById("m-collab")?.value);
  const prev=document.getElementById("collab-preview");if(!prev)return;
  if(isNaN(idx)||idx<0||idx>=sheetCollabs.length){prev.style.display="none";return;}
  const c=sheetCollabs[idx];
  document.getElementById("cp-dot").style.background=collabColor(c);
  document.getElementById("cp-dot").textContent=collabInit(c.name);
  document.getElementById("cp-info").textContent=c.name+(c.pseudo?" · @"+c.pseudo:"");
  prev.style.display="flex";
}
let selectedHalfDay="matin"; // "matin" ou "aprem"

function setPrest(code,el){
  selectedPrest=code;
  document.querySelectorAll("#m-prest-toggle button").forEach(b=>b.classList.remove("active"));
  if(el)el.classList.add("active");
  // Affiche/masque le toggle matin/aprem
  const hdToggle=document.getElementById("half-day-toggle");
  if(code==="HT"){hdToggle.classList.add("visible");}
  else{hdToggle.classList.remove("visible");}

}
function setHalfDay(period,el){
  selectedHalfDay=period;
  document.querySelectorAll(".hd-btn").forEach(b=>b.classList.remove("active"));
  if(el)el.classList.add("active");
}
function checkMatConflict(){
  const mi=parseInt(document.getElementById("m-materiel")?.value);
  const d=document.getElementById("m-date-start")?.value;
  const warn=document.getElementById("m-mat-warning");if(!warn)return;
  if(isNaN(mi)||mi<0||!d){warn.style.display="none";return;}
  const mn=sheetMat[mi]?.name;
  const conflict=calEvents.some(ev=>((ev.start?.date||ev.start?.dateTime?.slice(0,10))===d)&&ev.id!==editingEventId&&ev.description?.includes(mn));
  warn.style.display=conflict?"block":"none";
}
function buildTitle(){
  const dos=document.getElementById("m-dossier")?.value||"";
  const idx=parseInt(document.getElementById("m-collab")?.value);
  const collab=(!isNaN(idx)&&sheetCollabs[idx])?sheetCollabs[idx]:null;
  const tag=collabTag(collab);
  const dosInfo=dosById(dos);
  const lieu=(dosInfo?.lieu||"").replace(/\s+/g,"_");
  const hdSuffix=selectedPrest==="HT"?(selectedHalfDay==="matin"?"_M":"_AM"):"";
  return `${dos}_${selectedPrest}${hdSuffix}${lieu?"_"+lieu:""}${tag?"_"+tag:""}`;
}
function closeModal(){document.getElementById("modal-bg").classList.remove("open");}

async function saveEvent(){
  if(!accessToken){signIn();return;}
  const dos=document.getElementById("m-dossier")?.value;
  const ds=document.getElementById("m-date-start")?.value;
  const de=document.getElementById("m-date-end")?.value||ds;
  if(!dos||!ds){showToast("Remplis les champs obligatoires",true);return;}
  const idx=parseInt(document.getElementById("m-collab")?.value);
  const collab=(!isNaN(idx)&&sheetCollabs[idx])?sheetCollabs[idx]:null;
  const ph=PREST_HOURS[selectedPrest]||{s:8,d:8};
  // Pour les demi-journées, utiliser les horaires matin/aprem
  let startH=ph.s, endH=ph.s+ph.d;
  if(selectedPrest==="HT"){
    if(selectedHalfDay==="matin"){startH=8;endH=12;}
    else{startH=14;endH=17;}
  }
  const startDt=`${ds}T${String(startH).padStart(2,"0")}:00:00`;
  const endDt=`${de}T${String(endH).padStart(2,"0")}:00:00`;
  const mi=parseInt(document.getElementById("m-materiel")?.value);
  const matName=(!isNaN(mi)&&sheetMat[mi])?sheetMat[mi].name:"";
  const dosInfo=dosById(dos);
  const notes=document.getElementById("m-notes")?.value.trim()||"";
  const desc=[dosInfo?`${dosInfo.client} – ${dosInfo.lieu}`:"",
    dosInfo?.interlocuteur?`Interlocuteur : ${dosInfo.interlocuteur}`:"",
    collab?`Collaborateur : ${collab.name}`:"",notes,
    matName?`Matériel : ${matName}`:"","Créé via Arragon Planning"].filter(Boolean).join("\n");
  const event={summary:buildTitle(),description:desc,
    start:{dateTime:startDt,timeZone:"Europe/Paris"},
    end:{dateTime:endDt,timeZone:"Europe/Paris"},
    colorId:collab?.colorId||"1"};
  const isEdit=!!editingEventId;
  const url=isEdit
    ?`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events/${editingEventId}`
    :`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events`;
  const btn=document.getElementById("btn-modal-save");btn.textContent="⏳";
  try{
    const resp=await fetch(url,{method:isEdit?"PUT":"POST",
      headers:{Authorization:"Bearer "+accessToken,"Content-Type":"application/json"},body:JSON.stringify(event)});
    if(!resp.ok){if(resp.status===401){accessToken=null;signIn();}throw new Error(resp.status);}
    const created=await resp.json();
    if(isEdit){const i=calEvents.findIndex(e=>e.id===editingEventId);if(i>=0)calEvents[i]=created;}
    else calEvents.push(created);
    buildCalendar();closeModal();showToast(isEdit?"Mis à jour ✓":"Créé ✓");
  }catch(e){showToast("Erreur : "+e.message,true);}
  btn.textContent=isEdit?"Mettre à jour":"Enregistrer";
}
async function deleteEvent(){
  if(!accessToken||!editingEventId)return;
  if(!confirm("Supprimer cet événement ?"))return;
  try{
    await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events/${editingEventId}`,
      {method:"DELETE",headers:{Authorization:"Bearer "+accessToken}});
    calEvents=calEvents.filter(e=>e.id!==editingEventId);
    buildCalendar();closeModal();showToast("Supprimé");
  }catch(e){showToast("Erreur suppression",true);}
}

function openExportModal(){

  const ys=document.getElementById("exp-year");ys.innerHTML="";
  for(let y=curYear-1;y<=curYear+1;y++)ys.innerHTML+=`<option value="${y}"${y===curYear?" selected":""}>${y}</option>`;

function setExpType(t,el){expType=t;document.querySelectorAll("#exp-type-toggle button").forEach(b=>b.classList.remove("active"));el.classList.add("active");}

async function runExport(){
  const month=parseInt(document.getElementById("exp-month").value);
  const year=parseInt(document.getElementById("exp-year").value);
  const btn=document.getElementById("btn-run-export");btn.textContent="⏳";
  document.getElementById("export-status").textContent="Chargement des événements…";
  const first=new Date(year,month,1).toISOString();
  const last=new Date(year,month+1,0,23,59,59).toISOString();
  let events=[];
  try{
    const url=`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?timeMin=${encodeURIComponent(first)}&timeMax=${encodeURIComponent(last)}&singleEvents=true&orderBy=startTime&maxResults=500`;
    const resp=await fetch(url,{headers:{Authorization:"Bearer "+accessToken}});
    events=(await resp.json()).items||[];
  }catch(e){document.getElementById("export-status").textContent="Erreur";btn.textContent="Générer Excel";return;}

  // Parser avec comptage jours réels
  const byDossier={};
  events.forEach(ev=>{
    const parts=(ev.summary||"").split("_");
    if(parts.length<2)return;
    const dos=parts[0];
    // Le code peut être "HT" seul ou suivi "_M"/"_AM" — normaliser
    let code=parts[1];
    if(code==="HT"&&parts.length>=3&&(parts[2]==="M"||parts[2]==="AM"))code="HT";
    else if(!PREST_KEYS.includes(code))return;
    if(!PREST_KEYS.includes(code))return;
    let ds=ev.start?.date||ev.start?.dateTime?.slice(0,10);
    let de=ev.end?.date||ev.end?.dateTime?.slice(0,10);
    if(!ds)return;
    if(ev.end?.date){const e=new Date(de);e.setDate(e.getDate()-1);de=e.toISOString().slice(0,10);}
    if(!de||de<ds)de=ds;
    let nbJ=0,cur=new Date(ds+"T12:00:00"),last=new Date(de+"T12:00:00");
    while(cur<=last){const dow=cur.getDay();if(dow!==0&&dow!==6)nbJ++;cur.setDate(cur.getDate()+1);}
    const qty=nbJ;
    if(!byDossier[dos])byDossier[dos]=[];
    byDossier[dos].push({date:ds,dateEnd:de,code,title:ev.summary,nbJ,qty});
  });

  document.getElementById("export-status").textContent="Génération…";
  if(expType==="global"||expType==="both") genGlobal(year,month,byDossier);
  if(expType==="chantier"||expType==="both"){
    const delay=expType==="both"?800:0;
    setTimeout(()=>genChantiers(year,month,byDossier),delay);
  }
  btn.textContent="Générer Excel";
  document.getElementById("export-status").textContent="✅ Fichier(s) généré(s) !";
  setTimeout(()=>closeExportModal(),2500);
}

function xlsWrite(ws,r,c,v){ws[xlsCell(r,c)]={v,t:typeof v==="number"?"n":"s"};}

function genGlobal(year,month,byDossier){
  const wb={SheetNames:[],Sheets:{}};
  const mn=MONTHS_FR[month];
  const dos=Object.keys(byDossier).sort();

  // Feuille 1 : Style Suivi Pointages
  const ws1={};
  xlsWrite(ws1,0,0,`SUIVI POINTAGES CHANTIERS – ${mn.toUpperCase()} ${year}`);
  ["N° Dossier","Client / Chantier","Interlocuteur","Terrain 1J","Terrain ½J","Bureau","Nuit","Scan 3D","Total Jours","Montant (€)","Pointage Envoyé","BC Reçu","Facture Envoyée","Observations"]
    .forEach((h,i)=>xlsWrite(ws1,1,i,h));
  let row=2;
  dos.forEach(d=>{
    const evs=byDossier[d];const di=dosById(d);
    const tot={};PREST_KEYS.forEach(k=>tot[k]=0);
    evs.forEach(ev=>{if(tot[ev.code]!==undefined)tot[ev.code]+=ev.qty;});
    let total=0;PREST_KEYS.forEach((k,i)=>{const p=di?di[PRIX_KEYS[i]]||PRIX_DEFAULT[i]:PRIX_DEFAULT[i];total+=tot[k]*p;});
    const totalJ=PREST_KEYS.reduce((s,k)=>s+tot[k],0);
    [d,`${di?.client||""} – ${di?.lieu||""}`,di?.interlocuteur||"",tot["1T"],tot["HT"],tot["B"],tot["N"],tot["S3D"],totalJ,total,"⏳ En attente","⏳ En attente","⏳ En attente",""]
      .forEach((v,i)=>xlsWrite(ws1,row,i,v));
    row++;
  });
  xlsWrite(ws1,row,0,"TOTAUX");
  [3,4,5,6,7,8,9].forEach(ci=>{
    const col=colLetter(ci);
    ws1[xlsCell(row,ci)]={f:`SOMME(${col}3:${col}${row})`,t:"n",v:0};
  });
  ws1["!ref"]=`A1:N${row+1}`;
  wb.SheetNames.push(`Suivi ${mn}`);wb.Sheets[`Suivi ${mn}`]=ws1;

  // Feuille 2 : Récap simple
  const ws2={};
  ["N° Dossier","Client","Lieu",...PREST_LABELS,"TOTAL (€)"].forEach((h,i)=>xlsWrite(ws2,0,i,h));
  let r2=1;
  dos.forEach(d=>{
    const evs=byDossier[d];const di=dosById(d);
    const tot={};PREST_KEYS.forEach(k=>tot[k]=0);
    evs.forEach(ev=>{if(tot[ev.code]!==undefined)tot[ev.code]+=ev.qty;});
    let total=0;PREST_KEYS.forEach((k,i)=>{const p=di?di[PRIX_KEYS[i]]||PRIX_DEFAULT[i]:PRIX_DEFAULT[i];total+=tot[k]*p;});
    [d,di?.client||"",di?.lieu||"",...PREST_KEYS.map(k=>tot[k]||0),total].forEach((v,i)=>xlsWrite(ws2,r2,i,v));
    r2++;
  });
  ws2["!ref"]=`A1:I${r2+1}`;
  wb.SheetNames.push(`Récap ${mn}`);wb.Sheets[`Récap ${mn}`]=ws2;
  dlXlsx(wb,`Pointage_Global_${mn}_${year}.xlsx`);
}

function genChantiers(year,month,byDossier){
  Object.keys(byDossier).sort().forEach((dos,idx)=>{
    setTimeout(()=>{
      const wb={SheetNames:[],Sheets:{}};
      const mn=MONTHS_FR[month];const di=dosById(dos);const evs=byDossier[dos];const ws={};
      const meta=[["Cabinet Arragon"],["FEUILLE DE POINTAGE"],[mn.toUpperCase()+" "+year],
        ["Client :",di?.client||""],["N° Dossier :",dos],["Société :","Cabinet Arragon"],
        ["Poste occupé :","Géomètre - Topographe"],["Interlocuteur :",di?.interlocuteur||""],["Adresse :",di?.adresse||""],[""]];
      let r=0;meta.forEach(row=>{row.forEach((v,c)=>xlsWrite(ws,r,c,v));r++;});
      ["Ouvrage","","Terrain 1J","Terrain ½J","Bureau Étude","Nuit","Scan 3D"].forEach((v,c)=>xlsWrite(ws,r,c,v));r++;
      const tot={};PREST_KEYS.forEach(k=>tot[k]=0);
      evs.forEach(ev=>{if(tot[ev.code]!==undefined)tot[ev.code]+=ev.qty;});
      [`${dos} – ${di?.lieu||""}`,"",...PREST_KEYS.map(k=>tot[k])].forEach((v,c)=>xlsWrite(ws,r,c,v));r++;
      ["TOTAL","",...PREST_KEYS.map(k=>tot[k])].forEach((v,c)=>xlsWrite(ws,r,c,v));r+=2;
      xlsWrite(ws,r,0,"Prix jour");
      PREST_KEYS.forEach((k,i)=>xlsWrite(ws,r,i+2,di?di[PRIX_KEYS[i]]||PRIX_DEFAULT[i]:PRIX_DEFAULT[i]));r++;
      let gt=0;xlsWrite(ws,r,0,"TOTAL");
      PREST_KEYS.forEach((k,i)=>{const p=di?di[PRIX_KEYS[i]]||PRIX_DEFAULT[i]:PRIX_DEFAULT[i];const m2=tot[k]*p;gt+=m2;xlsWrite(ws,r,i+2,m2);});
      xlsWrite(ws,r,7,gt);r+=2;
      xlsWrite(ws,r,0,"Détail des interventions :");r++;
      ["Date","Date fin","Prestation","Nb jours"].forEach((v,c)=>xlsWrite(ws,r,c,v));r++;
      evs.sort((a,b)=>a.date.localeCompare(b.date)).forEach(ev=>{
        [ev.date,ev.dateEnd||ev.date,PREST_LABELS[PREST_KEYS.indexOf(ev.code)]||ev.code,ev.qty].forEach((v,c)=>xlsWrite(ws,r,c,v));r++;
      });
      ws["!ref"]=`A1:H${r+2}`;
      wb.SheetNames.push("Pointage");wb.Sheets["Pointage"]=ws;
      dlXlsx(wb,`Pointage_${dos.replace("/","-")}_${mn}_${year}.xlsx`);
    },idx*900);
  });
}

function dlXlsx(wb,filename){
  const buf=XLSX.write(wb,{type:"array",bookType:"xlsx"});
  const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}
